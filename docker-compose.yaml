services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: evolution-api
    # No Linux nativo, o Docker gerencia o DNS perfeitamente
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://seu-ip-ou-dominio:8080
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=76adcbe24c9d97b578e2ccc828ce15d8e9e68820ea344a43428730f01374e084
      
      # BANCO DE DADOS POSTGRES (Obrigatório para Produção)
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:pass_evolution_123@evolution-postgres:5432/evolution?schema=public
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=false
      - DATABASE_SAVE_MESSAGE_UPDATE=false
      
      # CACHE REDIS (Essencial para performance de SaaS)
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution_v2
      
      # WEBHOOKS
      # Quando subir para o Linux, aqui será a URL do seu site Django (ex: https://meusite.com/webhook/)
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:8000/whatsapp/webhook/receber/
      - WEBHOOK_GLOBAL_EVENTS=MESSAGES_UPSERT
      
    # No Linux, essa flag permite que o Docker fale com o sistema host se necessário
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=pass_evolution_123
      - POSTGRES_DB=evolution
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: evolution-redis
    restart: always

volumes:
  evolution_db_data: